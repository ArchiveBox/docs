# Read the Docs configuration file for ArchiveBox docs
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD Version Strategy:
#   - "stable" alias -> latest stable release tag (currently v0.7.3)
#   - "latest" alias -> default branch (master) = current dev docs (0.9.x)
#   - Tagged versions (v0.9.10, v0.8.6, v0.7.3, etc.) build from git tags
#
# Version history:
#   - 0.7.x = last stable release series (v0.7.2, v0.7.3)
#   - 0.8.x = dev/pre-release (never stable)
#   - 0.9.x = dev/pre-release (current development)
#
# RTD Admin Settings (configure in RTD dashboard):
#   - Default version: "stable" (points to v0.7.3, the last stable release)
#   - "latest" version: visible, shows dev docs (0.9.x) with warning banner
#   - Enable "build on tag push" for automatic versioned releases
#   - Once 0.9.x is declared stable, it becomes the new "stable" automatically
#
# To publish a new versioned docs release:
#   git tag v0.9.10 && git push wiki v0.9.10
#
# To access dev docs:
#   https://archivebox.readthedocs.io/en/latest/

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: conf.py

python:
  install:
    - requirements: requirements.txt
    # Install archivebox so autodoc2 can introspect the source
    - method: pip
      path: ..
      extra_requirements:
        - dev
