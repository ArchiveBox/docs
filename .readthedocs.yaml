# Read the Docs configuration file for ArchiveBox docs
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD Version Strategy:
#   - "latest" builds from the default branch (master) = dev docs
#   - Tagged versions (v0.9.10, v0.8.6, etc.) build from git tags = stable docs
#   - The "stable" alias auto-points to the latest non-prerelease tag
#
# RTD Admin Settings (configure in RTD dashboard):
#   - Default version: "stable" (so users land on latest release, not dev)
#   - "latest" version: set to "hidden" (accessible by URL but not default)
#   - Enable "build on tag push" for automatic versioned releases
#
# To publish a new versioned docs release:
#   git tag v0.9.10 && git push wiki v0.9.10
#   RTD auto-detects and builds it. The "stable" alias updates automatically.
#
# To access dev docs:
#   https://archivebox.readthedocs.io/en/latest/

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: conf.py

python:
  install:
    - requirements: requirements.txt
    # Install archivebox so autodoc2 can introspect the source
    - method: pip
      path: ..
      extra_requirements:
        - dev
